---
- name: Deploy Gaia Docker Compose stack
  hosts: gaia
  become: true
  vars:
    gaia_deploy_dir: /opt/gaia
    gaia_compose_src: "{{ playbook_dir }}/../docker-compose.yml"

  tasks:
    - name: Check Podman is installed
      ansible.builtin.command:
        cmd: podman --version
      changed_when: false

    - name: Check Podman Compose is available
      ansible.builtin.command:
        cmd: podman compose version
      changed_when: false

    - name: Create deployment directory
      ansible.builtin.file:
        path: "{{ gaia_deploy_dir }}"
        state: directory
        mode: "0755"

    - name: Copy Docker Compose file
      ansible.builtin.copy:
        src: "{{ gaia_compose_src }}"
        dest: "{{ gaia_deploy_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Render runtime environment file
      ansible.builtin.template:
        src: templates/gaia.env.j2
        dest: "{{ gaia_deploy_dir }}/.env"
        mode: "0600"

    - name: Pull latest Gaia image
      ansible.builtin.command:
        cmd: podman compose --env-file .env -f docker-compose.yml pull gaia gaia-migrate
        chdir: "{{ gaia_deploy_dir }}"

    - name: Ensure database service is up
      ansible.builtin.command:
        cmd: podman compose --env-file .env -f docker-compose.yml up -d gaia-db
        chdir: "{{ gaia_deploy_dir }}"

    - name: Run database migrations
      ansible.builtin.command:
        cmd: podman compose --env-file .env -f docker-compose.yml run --rm gaia-migrate
        chdir: "{{ gaia_deploy_dir }}"

    - name: Start Gaia services
      ansible.builtin.command:
        cmd: podman compose --env-file .env -f docker-compose.yml up -d gaia-db gaia
        chdir: "{{ gaia_deploy_dir }}"
